version: "3.9"

services:
  mlflow:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - MLFLOW_ALLOW_FILE_STORE=true
    command: >
      bash -c "pip install mlflow -q &&
               mlflow server
               --backend-store-uri file:///app/mlflow_store
               --default-artifact-root file:///app/mlflow_store
               --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - MLFLOW_ALLOW_FILE_STORE=true
      - PYTHONPATH=/app/src
    depends_on:
      - mlflow
    command: uvicorn src.serving.api:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - MLFLOW_ALLOW_FILE_STORE=true
      - PYTHONPATH=/app/src
    command: >
      bash -c "pip install streamlit plotly pandas -q &&
               streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - api
